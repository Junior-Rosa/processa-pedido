apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: processador-pedidos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.1.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Admin"
        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboard-json
          mountPath: /var/lib/grafana/dashboards
      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
      - name: dashboard-provider
        configMap:
          name: grafana-dashboard-provider
      - name: dashboard-json
        configMap:
          name: grafana-dashboard-json
